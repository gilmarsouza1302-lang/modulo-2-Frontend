<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <title>Aula Flexbox</title>
</head>
<body>
    
    <header class="cabecalho"> <!-- HEADER é onde podemos colocar o cabeçalho, logo, titulo, menu de navegação principal-->
        <h1>Minha Loja</h1>
        <nav class="menu"> <!-- NAV é onde criamos o menu de navegação-->
            <a href="#">Inicio</a> 
            <a href="#">Produto</a>
            <a href="#">Contato</a>
        </nav>
        
    </header>
    <main> <!-- Informações Principais dentro da pagina-->
        <section class="cards">

            <div class="produtos 1">
            <h2>Produto</h2> <!-- H2 Ela representa um título de nível 2-->

            <p>Descrição do Produto</p> <!--Ela é usada para escrever textos e conteúdos em forma de parágrafo.-->
            <button>Comprar</button>
            </div>
            
             <div class="produtos 2">
            <h2>Produto</h2>
            <p>Descrição do Produto</p>
            <button>Comprar</button>
            </div>
            
             <div class="produtos 3"> <!--Ela é uma tag usada para agrupar elementos e organizar o layout da página.-->
            <h2>Produto</h2>
            <p>Descrição do Produto</p>
            <button>Comprar</button>
            </div>
            
             <div class="produtos 4">
            <h2>Produto</h2>
            <p>Descrição do Produto</p>
            <button>Comprar</button>
            </div>
            
        </section>
    </main>
    <footer class="rodape">
        <p>&copy;2026 Minha Loja - Todos os direitos reservados</p>
<div class="redes-sociais">
    <a href="#"><img src="./img/facebook.png" alt="logo facebook"></a>
    <a href="#"><img src="./img/instagram.png" alt="logo instagram"></a>
</div>

    </footer> <!-- FOOTER É o rodapé da pagina, links segundarios, infomações de contato, telefone...-->
    
</body>
</html>
