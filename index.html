<!DOCTYPE html> <!--Informa ao navegador que este documento usa HTMLS--->
<html lang="pt-BR"> <!--Marca o inicio da pagiana HTML. O atributo lang="pt.BR" vai indicar que a liguagem e portugues.-->
<head> <!-- Cabeçalho da pagina. Aquifica config. e informações que não aparecem no corpo da pagina.-->
    <meta charset="UTF-8"> <!-- Define o padra de carecteres. Permite acentos, ç, emonjis e carecteris especiais.-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--Faz a pagina se adptar a celulares e computadores etc..-->
    <title>Meu primeiro site</title> <!--Titulo da pagina, aparece na aba do navegador-->
</head> <!--Fecha a tag HEAD-->
<body> <!--É o corpo da pagina. Tudo que aparece ao usuario fica aqui!-->
    <h1>Bem vindo ao meu site!</h1>
    <h2>Site para estudo do meu curso de full stack</h2>
    <p>Esta é uma estrura HTML básica</p>
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>
</body>
</html>
